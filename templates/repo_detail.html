<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepoRadar - Repository Issues</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1f2d45;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top, rgba(99, 102, 241, 0.16), transparent 35%),
        linear-gradient(180deg, #0a0e1a 0%, #09111f 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem;
    }

    .auth-panel {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      align-items: center;
      margin-bottom: 1rem;
      padding: .9rem 1rem;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .auth-panel.logged-in {
      justify-content: space-between;
    }
    .auth-guest {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      align-items: center;
      width: 100%;
    }
    .auth-user {
      display: none;
      width: 100%;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
    }
    .auth-panel.logged-in .auth-guest { display: none; }
    .auth-panel.logged-in .auth-user { display: flex; }

    .auth-input {
      min-width: 180px;
      padding: .72rem .95rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-family: inherit;
    }

    .auth-status {
      color: var(--muted);
      font-size: .86rem;
    }
    .profile-chip {
      display: inline-flex;
      align-items: center;
      gap: .65rem;
      padding: .55rem .8rem;
      border-radius: 999px;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.28);
      color: var(--text);
    }
    .profile-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: .9rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .profile-copy {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .profile-email {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }
    .profile-note {
      font-size: .75rem;
      color: var(--muted);
    }

    .auth-message {
      width: 100%;
      font-size: .82rem;
      color: #cbd5e1;
      min-height: 1rem;
    }

    .btn {
      padding: .72rem 1rem;
      font-size: .88rem;
      font-weight: 600;
      font-family: inherit;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: #cbd5e1;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      color: #cbd5e1;
      text-decoration: none;
      margin-bottom: 1.5rem;
      font-size: .9rem;
    }
    .back-link:hover { color: white; }

    .hero {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .repo-kicker {
      color: #93c5fd;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-bottom: .5rem;
    }

    .repo-name {
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      line-height: 1.08;
      margin-bottom: .45rem;
    }

    .repo-owner {
      color: var(--muted);
      font-size: .95rem;
    }

    .score-badge {
      flex-shrink: 0;
      border-radius: 14px;
      padding: .7rem 1rem;
      border: 1px solid rgba(99, 102, 241, 0.35);
      background: rgba(99, 102, 241, 0.12);
      text-align: right;
    }

    .score-badge strong {
      display: block;
      font-size: 1.35rem;
    }

    .score-badge span {
      color: var(--muted);
      font-size: .78rem;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-top: .75rem;
    }

    .star-btn {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      padding: .72rem 1rem;
      cursor: pointer;
      font-weight: 700;
    }
    .star-btn.active {
      color: #fbbf24;
      border-color: rgba(251, 191, 36, 0.45);
      background: rgba(245, 158, 11, 0.12);
    }

    .repo-description {
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 1.25rem;
    }

    .meta-row {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(148, 163, 184, 0.08);
      padding: .45rem .85rem;
      color: #cbd5e1;
      font-size: .82rem;
    }

    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: .55rem;
    }

    .topic {
      font-size: .76rem;
      color: #c4b5fd;
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.24);
      border-radius: 999px;
      padding: .3rem .7rem;
    }

    .section {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.5rem;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .section-head h2 {
      font-size: 1.15rem;
    }

    .section-head p {
      color: var(--muted);
      font-size: .88rem;
    }

    .issues-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .issue-card {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(26, 34, 53, 0.92), rgba(13, 18, 31, 0.96));
      border-radius: 18px;
      padding: 1rem;
    }

    .issue-title {
      color: white;
      text-decoration: none;
      display: inline-block;
      line-height: 1.45;
      font-size: 1rem;
      margin-bottom: .65rem;
    }
    .issue-title:hover { color: #a5b4fc; }

    .issue-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: .7rem;
    }

    .label-chip {
      padding: .18rem .5rem;
      border-radius: 999px;
      font-size: .68rem;
      font-weight: 600;
      border: 1px solid rgba(139, 92, 246, 0.24);
      background: rgba(139, 92, 246, 0.12);
      color: #c4b5fd;
    }
    .label-chip.bug { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.25); color: #fca5a5; }
    .label-chip.gfi { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.25); color: #86efac; }

    .issue-age {
      color: var(--muted);
      font-size: .76rem;
    }

    .summary {
      border-left: 2px solid rgba(99, 102, 241, 0.6);
      padding-left: .75rem;
      color: #cbd5e1;
      line-height: 1.65;
      font-size: .88rem;
    }

    .empty, .loader {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
    }

    .loader-spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      margin: 0 auto 1rem;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      .page { padding: 1rem; }
      .hero-top, .section-head { flex-direction: column; align-items: flex-start; }
      .score-badge { text-align: left; }
      .auth-user { flex-direction: column; align-items: stretch; }
      .profile-email { max-width: none; }
    }

    .chat-btn {
      padding: .4rem .7rem;
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.4);
      color: #a5b4fc;
      margin-left: auto;
    }
    .chat-btn:hover { background: rgba(99, 102, 241, 0.25); }
    
    .issue-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: .65rem;
    }

    /* Chat Drawer Overlay */
    .chat-drawer-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      z-index: 1000;
      display: none;
      justify-content: flex-end;
    }
    .chat-drawer-overlay.open { display: flex; }
    .chat-drawer {
      width: 400px;
      max-width: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    .chat-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface2);
    }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
    .close-btn:hover { color: white; }
    .chat-messages {
      flex: 1;
      padding: 1.25rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .chat-msg {
      max-width: 85%;
      padding: .85rem 1rem;
      border-radius: 12px;
      font-size: .9rem;
      line-height: 1.5;
    }
    .chat-msg.assistant {
      align-self: flex-start;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-bottom-left-radius: 2px;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-bottom-right-radius: 2px;
    }
    .chat-input-area {
      padding: 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      gap: .5rem;
    }
    .chat-input {
      flex: 1;
      padding: .75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
      color: white;
      font-family: inherit;
    }
    .chat-send-btn {
      padding: .75rem 1.25rem;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading-dots:after {
      content: '.';
      animation: dots 1.5s steps(5, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="/">← Back to search</a>

    <section class="auth-panel">
      <div class="auth-guest">
        <div class="auth-status" id="auth-status">Signed in as guest. Login to star this repository and receive issue emails.</div>
        <input id="auth-email" class="auth-input" type="email" placeholder="Email address" />
        <input id="auth-password" class="auth-input" type="password" placeholder="Password" />
        <button class="btn" type="button" onclick="loginUser()">Login</button>
        <button class="btn btn-outline" type="button" onclick="registerUser()">Register</button>
      </div>
      <div class="auth-user">
        <div class="profile-chip">
          <span class="profile-icon">◉</span>
          <div class="profile-copy">
            <span class="profile-email" id="profile-email">guest</span>
            <span class="profile-note">Email notifications are active for starred repositories</span>
          </div>
        </div>
        <button class="btn btn-outline" id="logout-btn" type="button" onclick="logoutUser()" style="display:none">Logout</button>
      </div>
      <div class="auth-message" id="auth-message"></div>
    </section>

    <section class="hero" id="repo-hero">
      <div class="loader">
        <div class="loader-spinner"></div>
        <p>Loading repository details...</p>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2>Recent Issues</h2>
          <p>Open issues from the last 5 days for this repository.</p>
        </div>
      </div>
      <div id="issues-root">
        <div class="loader">
          <div class="loader-spinner"></div>
          <p>Loading issues...</p>
        </div>
      </div>
    </section>
  </main>

  <div class="chat-drawer-overlay" id="chat-overlay" onclick="closeChat(event)">
    <div class="chat-drawer" onclick="event.stopPropagation()">
      <div class="chat-header">
        <h3>Beginner Guide Chat</h3>
        <button class="close-btn" onclick="closeChat()">×</button>
      </div>
      <div class="chat-messages" id="chat-messages">
        <!-- Messages will go here -->
      </div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" class="chat-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendChatMessage()" />
        <button id="chat-send-btn" class="chat-send-btn" onclick="sendChatMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const repoId = {{ repo_id }};
    const repoApi = `/api/repos/${repoId}/`;
    const issuesApi = `/api/repos/${repoId}/recent_issues/`;
    let currentUser = null;
    let currentRepo = null;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function fmt(n) {
      return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n ?? 0);
    }

    function getCsrfToken() {
      const cookie = document.cookie.split('; ').find(row => row.startsWith('csrftoken='));
      return cookie ? decodeURIComponent(cookie.split('=')[1]) : '';
    }

    function setAuthMessage(message, type='') {
      const el = document.getElementById('auth-message');
      el.textContent = message || '';
      el.style.color = type === 'error' ? '#fca5a5' : type === 'success' ? '#86efac' : '#cbd5e1';
    }

    function updateAuthUI() {
      const panel = document.querySelector('.auth-panel');
      const status = document.getElementById('auth-status');
      const profileEmail = document.getElementById('profile-email');
      const emailInput = document.getElementById('auth-email');
      const passwordInput = document.getElementById('auth-password');
      const logoutBtn = document.getElementById('logout-btn');
      if (currentUser) {
        panel.classList.add('logged-in');
        profileEmail.textContent = currentUser.email;
        logoutBtn.style.display = 'inline-flex';
      } else {
        panel.classList.remove('logged-in');
        status.textContent = 'Signed in as guest. Login to star this repository and receive issue emails.';
        profileEmail.textContent = 'guest';
        emailInput.value = '';
        passwordInput.value = '';
        logoutBtn.style.display = 'none';
      }
    }

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCsrfToken(),
        },
        credentials: 'same-origin',
        body: JSON.stringify(payload || {}),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || 'Request failed');
      return data;
    }

    async function refreshAuthStatus() {
      try {
        const res = await fetch('/api/auth/me/', { credentials: 'same-origin' });
        const data = await res.json();
        currentUser = data.authenticated ? data.user : null;
      } catch (error) {
        currentUser = null;
      }
      updateAuthUI();
    }

    async function loginUser() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      try {
        const data = await postJson('/api/auth/login/', { email, password });
        currentUser = data.user;
        updateAuthUI();
        setAuthMessage('Login successful.', 'success');
        await loadRepoOnly();
      } catch (error) {
        setAuthMessage(error.message, 'error');
      }
    }

    async function registerUser() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      try {
        const data = await postJson('/api/auth/register/', { email, password });
        currentUser = data.user;
        updateAuthUI();
        setAuthMessage('Account created.', 'success');
        await loadRepoOnly();
      } catch (error) {
        setAuthMessage(error.message, 'error');
      }
    }

    async function logoutUser() {
      try {
        await postJson('/api/auth/logout/', {});
        currentUser = null;
        if (currentRepo) {
          currentRepo.is_starred = false;
        }
        updateAuthUI();
        setAuthMessage('Logged out.', 'success');
        await loadRepoOnly();
      } catch (error) {
        setAuthMessage(error.message, 'error');
      }
    }

    async function toggleStar() {
      if (!currentUser) {
        setAuthMessage('Login or register first to star this repository.', 'error');
        return;
      }
      if (!currentRepo) {
        return;
      }

      try {
        const endpoint = currentRepo.is_starred ? 'unstar' : 'star';
        await postJson(`${repoApi}${endpoint}/`, {});
        currentRepo.is_starred = !currentRepo.is_starred;
        setAuthMessage(currentRepo.is_starred ? 'Repository added to notifications.' : 'Repository removed from notifications.', 'success');
        document.getElementById('repo-hero').innerHTML = renderRepo(currentRepo);
      } catch (error) {
        setAuthMessage(error.message, 'error');
      }
    }

    function issueAge(daysAgo) {
      if (daysAgo === 0) return 'opened today';
      if (daysAgo === 1) return 'opened 1 day ago';
      return `opened ${daysAgo} days ago`;
    }

    function renderRepo(repo) {
      const topics = (repo.topics || []).slice(0, 8);
      const starLabel = repo.is_starred ? '★ Watching for issue emails' : '☆ Star for issue emails';
      const starClass = repo.is_starred ? 'active' : '';
      return `
        <div class="hero-top">
          <div>
            <div class="repo-kicker">Repository Overview</div>
            <h1 class="repo-name">${escapeHtml(repo.full_name)}</h1>
            <div class="repo-owner">${escapeHtml(repo.owner || '')}</div>
          </div>
          <div class="score-badge">
            <strong>${Number(repo.final_score || 0).toFixed(1)}</strong>
            <span>AI Score</span>
          </div>
        </div>
        <p class="repo-description">${escapeHtml(repo.description || 'No description available for this repository.')}</p>
        <div class="hero-actions">
          <button class="star-btn ${starClass}" type="button" onclick="toggleStar()">${starLabel}</button>
        </div>
        <div class="meta-row">
          ${repo.language ? `<span class="pill">Language: ${escapeHtml(repo.language)}</span>` : ''}
          <span class="pill">Stars: ${fmt(repo.stars)}</span>
          <span class="pill">Forks: ${fmt(repo.forks)}</span>
          <span class="pill">Contributors: ${fmt(repo.contributors_count)}</span>
          <span class="pill">Open issues: ${fmt(repo.open_issues)}</span>
          <a class="pill" href="${escapeHtml(repo.repo_url)}" target="_blank" rel="noopener noreferrer">Open on GitHub</a>
        </div>
        ${topics.length ? `<div class="topics">${topics.map(topic => `<span class="topic">${escapeHtml(topic)}</span>`).join('')}</div>` : ''}
      `;
    }

    function renderIssues(payload) {
      const issues = payload.issues || [];
      if (!issues.length) {
        return `<div class="empty">No open issues were created in the last 5 days for this repository.</div>`;
      }

      return `<div class="issues-list">${issues.map(issue => {
        const labels = (issue.labels || []).map(label => {
          const lowered = label.toLowerCase();
          const cls = lowered.includes('bug') ? 'bug' : lowered.includes('good first') ? 'gfi' : '';
          return `<span class="label-chip ${cls}">${escapeHtml(label)}</span>`;
        }).join('');

        return `
          <article class="issue-card">
            <div class="issue-card-header">
              <a class="issue-title" href="${escapeHtml(issue.issue_url)}" target="_blank" rel="noopener noreferrer">
                #${issue.github_issue_number} ${escapeHtml(issue.title)}
              </a>
              <button class="chat-btn" onclick="startChat(${issue.id})">Guide for Beginner 💬</button>
            </div>
            <div class="issue-meta">
              <span class="issue-age">${issueAge(issue.days_ago)}</span>
              ${labels}
            </div>
            ${issue.ai_summary ? `<div class="summary">${escapeHtml(issue.ai_summary)}</div>` : ''}
          </article>
        `;
      }).join('')}</div>`;
    }

    async function loadRepoOnly() {
      const hero = document.getElementById('repo-hero');
      try {
        const repoRes = await fetch(repoApi, { credentials: 'same-origin' });
        if (!repoRes.ok) throw new Error(`HTTP ${repoRes.status}`);
        currentRepo = await repoRes.json();
        hero.innerHTML = renderRepo(currentRepo);
      } catch (error) {
        hero.innerHTML = `<div class="empty">Could not load repository details.</div>`;
      }
    }

    async function loadIssuesOnly() {
      const issuesRoot = document.getElementById('issues-root');
      try {
        const issuesRes = await fetch(issuesApi, { credentials: 'same-origin' });
        if (!issuesRes.ok) throw new Error(`HTTP ${issuesRes.status}`);
        const issues = await issuesRes.json();
        issuesRoot.innerHTML = renderIssues(issues);
      } catch (error) {
        issuesRoot.innerHTML = `<div class="empty">Could not load issue data for this repository.</div>`;
      }
    }

    async function loadPage() {
      await refreshAuthStatus();
      await Promise.all([loadRepoOnly(), loadIssuesOnly()]);
    }

    let currentSessionId = null;

    function openChat() {
      document.getElementById('chat-overlay').classList.add('open');
      document.getElementById('chat-messages').innerHTML = '';
      currentSessionId = null;
    }

    function closeChat(event) {
      if (event && event.target !== document.getElementById('chat-overlay')) return;
      document.getElementById('chat-overlay').classList.remove('open');
    }

    function appendMessage(role, text) {
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `chat-msg ${role}`;
      div.textContent = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function appendLoader() {
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `chat-msg assistant loader-msg`;
      div.innerHTML = `<span class="loading-dots">Thinking</span>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeLoader() {
      const loader = document.querySelector('.loader-msg');
      if (loader) loader.remove();
    }

    async function startChat(issueId) {
      if (!currentUser) {
        alert("Please login first to use the Beginner Guide Chat.");
        return;
      }
      openChat();
      appendLoader();
      try {
        const res = await postJson('/api/chat/start/', { issue_id: issueId });
        removeLoader();
        currentSessionId = res.session_id;
        appendMessage('assistant', res.message);
      } catch (e) {
        removeLoader();
        appendMessage('assistant', 'Error starting chat: ' + e.message);
      }
    }

    async function sendChatMessage() {
      if (!currentSessionId) return;
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      appendMessage('user', text);
      appendLoader();
      
      try {
        const res = await postJson(`/api/chat/${currentSessionId}/message/`, { message: text });
        removeLoader();
        appendMessage('assistant', res.message);
      } catch (e) {
        removeLoader();
        appendMessage('assistant', 'Error sending message: ' + e.message);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('auth-password').addEventListener('keydown', e => {
        if (e.key === 'Enter') loginUser();
      });
      loadPage();
    });
  </script>
</body>
</html>
